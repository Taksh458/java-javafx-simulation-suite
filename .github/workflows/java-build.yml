name: Java build verification

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Download repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: javafx-dashboard/pom.xml

      - name: Compile console simulation
        run: |
          mkdir -p console-simulation/out
          javac \
            -d console-simulation/out \
            console-simulation/src/com/takshil/simulation/*.java

      - name: Run console simulation
        run: |
          java \
            -cp console-simulation/out \
            com.takshil.simulation.SimulationApp \
            | tee simulation-output.txt

          grep -q "order=4 | cooking complete" simulation-output.txt

      - name: Build JavaFX dashboard
        run: |
          mvn \
            -B \
            -f javafx-dashboard/pom.xml \
            -DskipTests \
            package
